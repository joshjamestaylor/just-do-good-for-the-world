# Netlify config for the DETACHED static frontend.
#
# This file lives inside frontend/ so it travels with the app when it is split
# into its own repository. Deploying from the monorepo? Set the Netlify site's
# "Base directory" to `frontend` so this config and the build run from here.

[build]
  command = "npm run generate"
  # The netlify-static preset (set below) writes the static site to dist/.
  publish = "dist"

[build.environment]
  # Force a fully static export (bare "netlify" would be serverless).
  NITRO_PRESET = "netlify-static"
  # Give the prerenderer headroom — the default ~2GB Node heap OOMs on larger
  # page sets during `nuxt generate`.
  NODE_OPTIONS = "--max-old-space-size=4096"
  # Continuous deployment WITHOUT a reachable CMS: the git-triggered build reads
  # the content snapshot committed under public/api-snapshot. Regenerate it
  # locally with `npm run snapshot`, then commit + push — Netlify rebuilds.
  # NOTE: a NUXT_PUBLIC_API_BASE set in the Netlify UI overrides this line —
  # remove it there (or set it to /api-snapshot) so this value wins.
  # When the CMS gets a public URL, change this to that API
  # (e.g. https://cms.example.com/api/v1) to build against live content instead.
  NUXT_PUBLIC_API_BASE = "/api-snapshot"

# SPA fallback so the token-guarded /preview/* route works on the static host.
[[redirects]]
  from = "/preview/*"
  to = "/index.html"
  status = 200
